name: Supabase keep-alive

# Pings the Supabase database daily so the free-tier project doesn't pause.
#
# Why we write rather than read: the activity detector watches Postgres
# query traffic. A REST GET/HEAD against PostgREST can sometimes be
# served from gateway-level caches without touching Postgres — which
# means it doesn't register as activity. An UPDATE can't be cached
# (the database has to actually perform the write), so it always counts.
#
# Why daily rather than every-3-days: writes are extremely cheap, and
# daily pings remove any ambiguity about timing edge cases at month
# boundaries or during GitHub Actions delays.

on:
  schedule:
    # Daily at 06:00 UTC.
    - cron: '0 6 * * *'
  # Lets you trigger it manually from the Actions tab.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Heartbeat write to Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "Writing heartbeat row to Supabase..."

          # PATCH updates the single row (id=1) in the heartbeat table.
          # `last_ping_at=now()` runs server-side. We don't care about
          # the response body, only that the write succeeded.
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X PATCH \
            "${SUPABASE_URL}/rest/v1/heartbeat?id=eq.1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d '{"last_ping_at": "now()"}')

          echo "HTTP status: ${HTTP_STATUS}"
          echo "Response body:"
          cat /tmp/response.json
          echo ""

          # PostgREST returns 200 for an update with return=representation.
          # 204 would also be fine (return=minimal). Anything 2xx means
          # the write hit Postgres.
          if [ "${HTTP_STATUS}" -ge 200 ] && [ "${HTTP_STATUS}" -lt 300 ]; then
            echo "Success — heartbeat updated."
          else
            echo "::error::Unexpected status ${HTTP_STATUS}. The keep-alive may not be working."
            exit 1
          fi
