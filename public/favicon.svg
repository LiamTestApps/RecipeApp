  <ellipse cx="29" cy="32" rx="3" ry="2" fill="#8aa389" transform="rotate(-30 29 32)"/>
  <ellipse cx="35" cy="34" rx="3" ry="2" fill="#8aa389" transform="rotate(30 35 34)"/>
